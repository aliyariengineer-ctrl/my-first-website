<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شرکت مهندسی علی یاری</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .contact-form div {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background-color: var(--secondary-color);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>شرکت مهندسی علی یاری</h1>
        <p>ارائه دهنده خدمات نوین مهندسی و تکنولوژی</p>
    </header>

    <div class="container">
        <!-- بخش درباره ما -->
        <div class="card">
            <h2><i class="fas fa-info-circle"></i> درباره ما</h2>
            <p>ما با بهره‌گیری از متخصصین مجرب، بهترین راهکارهای مهندسی را برای کسب‌وکار شما فراهم می‌کنیم.</p>
        </div>

        <!-- بخش فرم تماس (متصل به Formspree) -->
        <div class="card">
            <h2><i class="fas fa-envelope"></i> ارسال پیام به مدیریت</h2>
            <form action="https://formspree.io/f/xaqzodlv" method="POST" class="contact-form">
                <div>
                    <label>نام شما:</label>
                    <input type="text" name="name" placeholder="مثلاً: علی علوی" required>
                </div>
                <div>
                    <label>ایمیل شما:</label>
                    <input type="email" name="email" placeholder="email@example.com" required>
                </div>
                <div>
                    <label>متن پیام:</label>
                    <textarea name="message" rows="5" placeholder="پیام خود را اینجا بنویسید..." required></textarea>
                </div>
                <button type="submit">ارسال پیام</button>
            </form>
        </div>
    </div>

    <footer>
        &copy; ۲۰۲۶ تمامی حقوق محفوظ است | طراحی شده توسط سیستم هوشمند
    </footer>

</body>
</html>
