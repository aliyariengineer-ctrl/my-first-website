<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سفارش شما ثبت شد | طراحیار</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Tahoma', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .thanks-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .check-icon {
            font-size: 80px;
            color: #10b981;
            margin-bottom: 20px;
        }
        .btn-home {
            background: linear-gradient(45deg, #3b82f6, #2563eb);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
            margin-top: 25px;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
            color: white;
        }
    </style>
</head>
<body>

    <div class="thanks-card">
        <div class="check-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="mb-3">سفارش شما با موفقیت ثبت شد!</h1>
        <p class="text-secondary">از اعتماد شما سپاسگزاریم. کارشناسان ما تا ۲۴ ساعت آینده جهت هماهنگی نهایی با شما تماس خواهند گرفت.</p>
        <a href="index.html" class="btn-home">
            <i class="fas fa-arrow-right me-2"></i> بازگشت به صفحه اصلی
        </a>
    </div>

</body>
</html>
