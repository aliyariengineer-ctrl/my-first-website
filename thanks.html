<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سفارش شما ثبت شد | طراحیار</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Tahoma', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .thanks-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .check-icon {
            font-size: 80px;
            color: #10b981;
            margin-bottom: 20px;
        }
        /* استایل بخش پرداخت */
        .payment-box {
            background: rgba(15, 23, 42, 0.5);
            border: 1px dashed #3b82f6;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        .btn-pay-toggle {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
        }
        .btn-copy {
            background: #475569;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 12px;
            margin-top: 10px;
            cursor: pointer;
        }
        .btn-home {
            background: transparent;
            border: 1px solid #3b82f6;
            padding: 10px 30px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
            margin-top: 20px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="thanks-card">
        <div class="check-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="h3 mb-3">سفارش شما با موفقیت ثبت شد!</h1>
        <p class="text-secondary mb-4">از اعتماد شما سپاسگزاریم. کارشناسان ما جهت هماهنگی با شما تماس خواهند گرفت.</p>

        <!-- بخش نمایش هوشمند شماره کارت -->
        <div id="payment-area">
            <button class="btn-pay-toggle" onclick="loadPaymentInfo()">
                <i class="fas fa-credit-card me-2"></i> نمایش اطلاعات واریز پیش‌پرداخت
            </button>
        </div>

        <a href="index.html" class="btn-home">
            <i class="fas fa-arrow-right me-2"></i> بازگشت به صفحه اصلی
        </a>
    </div>

    <script>
        function loadPaymentInfo() {
            fetch('payment.json')
                .then(response => response.json())
                .then(data => {
                    const area = document.getElementById('payment-area');
                    area.innerHTML = `
                        <div class="payment-box">
                            <p class="text-info small mb-2">شماره کارت جهت واریز:</p>
                            <h4 style="letter-spacing: 3px; color: #fff;">${data.card}</h4>
                            <p class="small text-light">به نام: <strong>${data.name}</strong></p>
                            <button class="btn-copy" onclick="copyCard('${data.card}')">
                                <i class="fas fa-copy me-1"></i> کپی شماره کارت
                            </button>
                            <p style="font-size: 11px; color: #94a3b8; margin-top: 15px;">
                                لطفاً پس از واریز، تصویر فیش را در ایتا یا تلگرام برای پشتیبانی ارسال کنید.
                            </p>
                        </div>
                    `;
                })
               .catch(err => {
    alert("خطا: " + err);
});

        }

        function copyCard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("شماره کارت کپی شد!");
            });
        }
    </script>

</body>
</html>
